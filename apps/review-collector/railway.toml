[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/review-collector/Dockerfile"
# Build context MUST be the monorepo root (Railway Root Directory empty).
watchPatterns = ["apps/review-collector/**"]

[deploy]
# Wipe any dashboard Start Command that runs plain `node dist/index.js`.
startCommand = "./entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"

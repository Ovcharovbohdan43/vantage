[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/review-collector/Dockerfile"
watchPatterns = ["apps/review-collector/**"]

[deploy]
# Must match Dockerfile CMD — clears any dashboard Start Command that still
# points at celery or plain `node dist/index.js` without the camoufox preload.
startCommand = "node --import ./dist/preload-camoufox-env.js dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vantage email previews</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #e6edf3; }
    header { padding: 24px 20px 8px; max-width: 960px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 16px; color: #8b949e; font-size: 14px; }
    .frame-wrap { max-width: 960px; margin: 0 auto 32px; padding: 0 16px; }
    .label { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 8px; }
    iframe { width: 100%; height: 720px; border: 1px solid #30363d; border-radius: 6px; background: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Vantage email templates</h1>
    <p>GitHub-style previews. Open each filled HTML file alone for a full-width check.</p>
  </header>
  <div class="frame-wrap">
    <p class="label">Confirm signup</p>
    <iframe title="Confirm signup" src="confirm-signup-filled.html"></iframe>
  </div>
  <div class="frame-wrap">
    <p class="label">Reset password</p>
    <iframe title="Reset password" src="reset-password-filled.html"></iframe>
  </div>
  <div class="frame-wrap">
    <p class="label">Welcome credits</p>
    <iframe title="Welcome credits" src="welcome-credits-filled.html"></iframe>
  </div>
</body>
</html>
